# stations-reports.yaml
#
# List of stations one wants to generate the reports for.
#
# Two-letter code specifying entries and long-names as "name" is required.
# Emails is optional (but required for report send-offs, obviously) and
# uses a standard yaml list to specify multiple emails, second entry onwards are CC'ed.
#
# That's the plan, anyway.
#
# Note:
# used `sed -E 's/^([[:space:]]*)([A-Za-z]{2}):/\1"\2":/' stations-reports.yaml > tmp`
# to get quotes around the two-letter codes.

